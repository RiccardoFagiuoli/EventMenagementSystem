{% extends 'base.html' %}

{% block title %}Registrazione - Event Management System{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 2rem auto;">
    <h2 style="text-align: center;">Registrati</h2>

    <form method="post" style="margin-top: 2rem;">
        {% csrf_token %}

        <div class="form-group">
            <label for="first_name">Nome</label>
            <input type="text" name="first_name" id="first_name" required>
        </div>

        <div class="form-group">
            <label for="last_name">Cognome</label>
            <input type="text" name="last_name" id="last_name" required>
        </div>

        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" required>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" required>
        </div>

        <div class="form-group">
            <label for="password_confirm">Conferma Password</label>
            <input type="password" name="password_confirm" id="password_confirm" required>
        </div>

        <div class="form-group">
            <label for="role">Tipo di Utente</label>
            <select name="role" id="role" required>
                <option value="attendee">Partecipante (Attendee)</option>
                <option value="organizer">Organizzatore (Organizer)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="phone">Numero di Telefono (Opzionale)</label>
            <input type="tel" name="phone" id="phone">
        </div>

        <div class="btn-group">
            <button type="submit" class="btn">Registrati</button>
        </div>
    </form>

    <div style="text-align: center; margin-top: 1rem;">
        <p>Hai già un account? <a href="{% url 'users:login' %}" style="text-decoration: underline;">Accedi qui</a></p>
    </div>
</div>
{% endblock %}
